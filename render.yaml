services:
  - type: web
    name: good-grouping
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: starter
    region: oregon
    autoDeploy: false
    healthCheckPath: /
    disk:
      name: good-grouping-data
      mountPath: /app/data
      sizeGB: 1
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "3000"
      - key: SESSION_SECRET
        generateValue: true
      - key: RP_NAME
        value: Good Grouping
      - key: RP_ID
        sync: false
      - key: ORIGIN
        sync: false
      - key: BASE_URL
        sync: false
      - key: TRUST_PROXY
        value: "true"
